<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getting Elements</title>
</head>

<body>
    <div class="container">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box" id="red">box3</div>
        <div class="box" id="green">box4</div>
        <div class="box">box5</div>
    </div>
    <script>
        // document.getElementsByClassName('box')[2].style.backgroundColor = 'red'
        // document.getElementById('green').style.background = 'Green'
        // document.querySelector('.box').style.background = 'Green'

        // let color = document.querySelectorAll('.box')
        // for (let i = 0; i < color.length; i++) {
        //     color[i].style.backgroundColor = 'Green'
        // }   or

        document.querySelectorAll('.box').forEach(e => {
            e.style.backgroundColor = 'Green'
        })

        //Matches Method
        for (let i = 0; i < document.getElementsByTagName('div').length; i++) {
            if(document.getElementsByTagName('div')[i].matches('#red')){
                alert('Red id mathes at ' + i)
                break
            }
        }

        //closet Method   =>   ye sirf parwent mein dekhta
        let e = document.getElementById('green').closest('.container')
        console.log(e);
        
        //Contain Method
        console.log(document.getElementsByClassName('container')[0].contains(document.querySelector('#red')), ' .container contains .red');
        
    </script>
</body>

</html>
