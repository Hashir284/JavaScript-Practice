<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript DOM</title>
</head>

<body>

    <p>p1</p>

    <div class="container">
        <div class="box" id="box">
            <p>p1</p>
            <p>I am box</p>
        </div>
    </div>

    <img src="image.png" alt="" width="300px" height="300px">

    <script>
        document.title = 'Hashir is Good'
        // document.html.title = 'Hashir is Good' // Wrong
        // console.log(document.documentElement);
        document.body.style.backgroundColor = 'Green'

        // document object model
        //Dom ---> dom object mein humein saara page ka content deta
        //Browser object model
        //browser humein kuch additional objects provide kerta he usse kehte hein BOM
        //jaisa ke location.href = 'codewithharry.com' isse hum rediract ker sakte dusre url mein

        // Finding Elemens
        document.getElementById('box')
        document.getElementsByClassName('box')  // []
        document.getElementsByTagName('div') // []

        let d = document.getElementById("box");
        let p = d.getElementsByTagName("p");
        for (let i = 0; i < p.length; i++) {
            console.log(p[i]);
        }

        console.log(document.childNodes);
        

    </script>
</body>

</html>
