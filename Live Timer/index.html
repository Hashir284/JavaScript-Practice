    <title>Time</title>
    <style>
        #time{
            font-size: 300px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>   
    <div id="time"></div>
    <script>
        setInterval(function () {
            let now = new Date()
            // now.setSeconds(1)
            let hours = now.getHours()
            if (hours == 0) {
                hours = 12
            } else if (hours > 12) {
                hours = hours - 12
            }
            let sec = now.getSeconds()
            sec = `${sec}`
            if(sec.length == 1){
                sec = '0' + sec
            }
            document.getElementById('time').innerText = `${hours}:${now.getMinutes()}:${sec}`
        }, 1)
