
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body{
            color: #fff;
            background-color: #000;
            font-family: sans-serif;
            input{
                padding: 10px;
                margin-bottom: 20px;
                max-width: 400px;
                width: 100%;
            }
            button{
                padding: 10px;
                margin-bottom: 20px;
            }
            
        }

    </style>
</head>
<body>
    <h1>Register</h1>

    <form onsubmit="registerUser(); return false">
        <label for="userName">
            Name: <input type="text" id="userName" placeholder="Enter your Name">
        </label>
        <br>
        <label for="userEmail">
            Email: <input type="text" id="userEmail" placeholder="Enter your Email">
        </label>
        <br>
        <label for="userPassword">
            Password: <input type="text" id="userPassword" placeholder="Enter your Password">
        </label>
        <br>
        <button>Register</button>
    </form>

    <a href="#">
        Already Have an Account
    </a>

    <script src="script.js"></script>
</body>
</html>
