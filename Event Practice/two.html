<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Webpage 2</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #1e1e2f, #2a2a3d);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #f0f0f0;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        form input {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #555;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        form input:focus {
            outline: none;
            border-color: #1abc9c;
            box-shadow: 0 0 10px rgba(26, 188, 156, 0.4);
        }

        form button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #1abc9c;
            cursor: pointer;
            transition: 0.3s ease;
        }

        form button:hover {
            background: #16a085;
            transform: scale(1.03);
        }

        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        th, td {
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        thead {
            background: #34495e;
        }

        thead th {
            color: #ecf0f1;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        tbody td button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            background: #e74c3c;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        tbody td button:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        @media(max-width: 500px){
            form, table {
                width: 100%;
            }

            th, td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

    <h1>Student Registration</h1>

    <form onsubmit="return false">
        <input type="text" placeholder="Enter Student Name" id="sn">
        <input type="text" placeholder="Enter Roll Number" id="srn">
        <button onclick="userinput()">Submit</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>S.No</th>
                <th>Student Name</th>
                <th>Roll Number</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tbody">

        </tbody>
    </table>

    <script src="twopractice.js"></script>
</body>
</html>
