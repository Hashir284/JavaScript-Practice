        function ConstructorFunc(Monthly, diskSpace, dataTransfer, sitePages, discountMonths, discountPercent) {
            this.Monthly = Monthly
            this.diskSpace = diskSpace
            this.dataTransfer = dataTransfer
            this.sitePages = sitePages
            this.discountMonths = discountMonths
            this.discountPercent = discountPercent
            this.calc = function() {
                let Discount = Monthly.slice(1)
                // month = new Date()
                let month = 6
                for (let i = 0; i < discountMonths.length; i++) {
                    if (discountMonths[i] == month) {
                        Discount = Monthly.slice(1) * discountPercent
                        console.log(Discount);
                        console.log(discountMonths[i]);
                        break
                    }
                }
                Discount = '$' + Math.round((Discount * 12))
                console.log(Discount);

                if (Discount == Monthly) {
                    Discount = 'No Discount'
                } 
                return Discount
            }
        }

        let basic = new ConstructorFunc('$3', '100GB', '1000GB/Mo', 10, [6, 7], 0.85)
        let professional = new ConstructorFunc('$5', '500GB', '5000GB/Mo', 50, [6, 7], 0.85)
        let ultimate = new ConstructorFunc('$10', '200GB', '20000GB/Mo', 500, [6, 7], 0.85)
